spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/kp3?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: localhost
    port: 6379
    password: 
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
      config:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP  # 配置分组（默认DEFAULT_GROUP）
        name: user-service  # 配置文件名（默认与应用名相同）
        file-extension: yml  # 配置文件格式（yml 或 properties）
  config:
    import: nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}  # 核心配置，指定导入Nacos的配置源
server:
  port: 8081

jwt:
  secret: kp3_secret_key
  expiration: 86400000
