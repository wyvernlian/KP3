spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/kp3?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: localhost
    port: 6379
    password: 
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
      config:
        server-addr: localhost:8848
        namespace: public
        file-extension: yaml

server:
  port: 8081

jwt:
  secret: kp3_secret_key
  expire: 86400
