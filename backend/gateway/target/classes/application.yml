spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # 用户服务路由
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/user/**
        # 预约服务路由
        - id: booking-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/booking/**
        # 场馆服务路由
        - id: venue-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/venue/**
        # 资讯服务路由
        - id: info-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/info/**
        # 统计服务路由
        - id: stat-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/stat/**

server:
  port: 8080

logging:
  level:
    root: info
    "[org.springframework.cloud.gateway]": debug
