version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kp3-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kp3
      MYSQL_USER: kp3
      MYSQL_PASSWORD: kp3
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7.0
    container_name: kp3-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: kp3-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server --console-address :9001 /data
    restart: always

  nacos:
    image: nacos/nacos-server:v2.0.3
    container_name: kp3-nacos
    ports:
      - "8848:8848"
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
    volumes:
      - nacos-data:/home/nacos/data
    restart: always

volumes:
  mysql-data:
  redis-data:
  minio-data:
  nacos-data: